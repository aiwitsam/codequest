# CodeQuest Configuration
# User overrides: ~/.codequest/config.yaml (auto-created on first run)

scan_paths: []
  # Add specific project paths here, e.g.:
  # - ~/my-project
  # - ~/work/api-server

auto_discover: true
auto_discover_paths:
  - ~/

exclude_paths:
  # Common system/tool directories to skip during auto-discovery
  - ~/node_modules
  - ~/snap
  - ~/.cache
  - ~/.local
  - ~/.vscode-server
  - ~/.claude
  # Add your own exclusions:
  # - ~/some-private-dir

overrides: {}

llm:
  primary: ollama
  claude_model: claude-sonnet-4-6
  offline_model: mistral:7b
  fallback_model: gemma3:4b
  force_backend: null

web:
  port: 8080
  auto_open_browser: true

theme: retro-green
first_run_complete: false
